<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Double Tulip Bouquets - Eternal Bloom</title>
    <style>
        :root {
            --bg-primary: #08081a;
            --bg-gradient: linear-gradient(135deg, #08081a 0%, #1a0033 50%, #000 100%);
            --accent-rose: #ff3366;
            --accent-coral: #ff6b6b;
            --accent-mint: #4ade80;
            --accent-lavender: #a78bfa;
            --text-glow: #f0f4ff;
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.12);
            --shadow-soft: rgba(0,0,0,0.6);
            --glow-rose: rgba(255, 51, 102, 0.7);
            --glow-mint: rgba(74, 222, 128, 0.6);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'SF Pro Display', -apple-system, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-glow);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            cursor: none;
        }

        /* Dual custom cursors */
        .cursor-primary, .cursor-secondary {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1000;
            transition: all 0.12s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .cursor-primary {
            width: 16px; height: 16px;
            background: radial-gradient(circle, var(--accent-rose), transparent);
            mix-blend-mode: screen;
            box-shadow: 0 0 20px var(--glow-rose);
        }

        .cursor-secondary {
            width: 8px; height: 8px;
            background: radial-gradient(circle, var(--accent-mint), transparent);
            mix-blend-mode: difference;
            box-shadow: 0 0 12px var(--glow-mint);
        }

        /* Ethereal particle system */
        .particles { position: absolute; inset: 0; z-index: 1; }
        .particle {
            position: absolute;
            border-radius: 50%;
            opacity: 0.4;
            animation: drift linear infinite;
        }

        .particle.rose { background: radial-gradient(var(--accent-rose), transparent); }
        .particle.mint { background: radial-gradient(var(--accent-mint), transparent); }
        .particle.lavender { background: radial-gradient(var(--accent-lavender), transparent); }

        @keyframes drift {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-50px) scale(1); opacity: 0; }
        }

        /* Container for dual horizontal bouquets */
        .bouquets-container {
            display: flex;
            flex-direction: column;
            gap: 60px;
            align-items: center;
            z-index: 10;
        }

        .bouquet {
            display: flex;
            align-items: flex-end;
            gap: 6px;
            height: 280px;
            padding: 20px;
            border-radius: 24px;
            backdrop-filter: blur(16px);
            position: relative;
        }

        .bouquet.primary { background: rgba(255,51,102,0.06); border: 1px solid var(--glow-rose); }
        .bouquet.secondary { background: rgba(74,222,128,0.08); border: 1px solid var(--glow-mint); }

        .tulip {
            display: flex;
            flex-direction: column;
            align-items: center;
            transform-origin: bottom;
            transition: all 1.4s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .stem {
            width: 3px;
            height: 240px;
            background: linear-gradient(to top, var(--accent-mint), #22c55e);
            border-radius: 0 0 2px 2px;
            position: relative;
            filter: drop-shadow(0 12px 24px var(--shadow-soft));
        }

        .stem::before {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                90deg,
                transparent 0,
                rgba(255,255,255,0.15) 1px,
                transparent 3px
            );
            border-radius: inherit;
        }

        .stem-vein {
            position: absolute;
            width: 1px;
            height: 60px;
            background: rgba(255,255,255,0.3);
            left: 50%;
            transform: translateX(-50%) rotate(5deg);
            top: 40px;
        }

        .leaves {
            position: absolute;
            left: -14px;
        }

        .leaf {
            width: 28px;
            height: 52px;
            background: linear-gradient(135deg, var(--accent-mint), #22c55e);
            border-radius: 50% 0 70% 20%;
            margin-bottom: 8px;
            filter: drop-shadow(0 4px 12px var(--shadow-soft));
            transform-origin: center bottom;
        }

        .leaf:first-child { transform: rotate(-25deg); }
        .leaf:last-child { transform: rotate(25deg); margin-left: 14px; }

        .flower {
            position: relative;
            width: 38px;
            height: 48px;
            margin-top: -12px;
            transform-origin: center bottom;
        }

        .petals {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .petal {
            position: absolute;
            width: 26px;
            height: 34px;
            top: 4px;
            left: 50%;
            transform: translateX(-50%) scaleY(0.2) translateY(20px);
            border-radius: 50% 50% 60% 60% / 50% 50% 50% 50%;
            transition: all 1.2s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            filter: drop-shadow(0 8px 20px var(--glow-rose));
        }

        .petal-1 { background: radial-gradient(ellipse at 30% 20%, var(--accent-rose), var(--accent-coral)); }
        .petal-2 { background: radial-gradient(ellipse at 50% 10%, var(--accent-coral), var(--accent-rose)); }
        .petal-3 { background: radial-gradient(ellipse at 70% 20%, var(--accent-rose), var(--accent-coral)); }

        .bloom .petal-1 { transform: translateX(-50%) scaleY(1) rotate(0deg); }
        .bloom .petal-2 { transform: translateX(-50%) scaleY(1) rotate(120deg); }
        .bloom .petal-3 { transform: translateX(-50%) scaleY(1) rotate(240deg); }

        .bloom .petal {
            filter: drop-shadow(0 0 36px var(--glow-rose));
            transform: scale(1.1);
        }

        /* Animations */
        @keyframes stem-sway {
            0%, 100% { transform: rotateZ(-1deg); }
            50% { transform: rotateZ(1deg); }
        }

        @keyframes petal-glow {
            0% { box-shadow: 0 0 20px var(--glow-rose); }
            50% { box-shadow: 0 0 48px var(--glow-rose); }
            100% { box-shadow: 0 0 36px var(--glow-rose); }
        }

        .bloom .stem { animation: stem-sway 2.5s ease-in-out infinite; }
        .bloom .flower { animation: petal-glow 2s ease-in-out infinite; }

        .btn {
            background: var(--glass);
            backdrop-filter: blur(32px);
            border: 1px solid var(--glass-border);
            color: var(--text-glow);
            font-size: 22px;
            font-weight: 600;
            padding: 20px 48px;
            border-radius: 56px;
            cursor: none;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: 0 24px 64px var(--shadow-soft);
            z-index: 20;
            position: relative;
            margin-top: 40px;
        }

        .btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(45deg, transparent 30%, rgba(255,255,255,0.1) 50%, transparent 70%);
            border-radius: inherit;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .btn:hover::before { opacity: 1; animation: shimmer 1.5s infinite; }
        .btn:hover {
            background: rgba(255,51,102,0.18);
            border-color: var(--accent-rose);
            transform: translateY(-6px) scale(1.05);
            box-shadow: 0 32px 80px rgba(255,51,102,0.3);
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%) translateY(-100%); }
            100% { transform: translateX(100%) translateY(100%); }
        }

        .message {
            opacity: 0;
            transform: scale(0.9) translateY(40px);
            transition: all 1.6s 1.5s cubic-bezier(0.23, 1, 0.32, 1);
            text-align: center;
            max-width: 480px;
            font-size: 24px;
            line-height: 1.5;
            padding: 56px 40px;
            background: var(--glass);
            backdrop-filter: blur(32px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            box-shadow: 0 40px 100px var(--shadow-soft);
            margin-top: 56px;
            z-index: 15;
        }

        .bloomed .message {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        .hearts { position: absolute; inset: 0; pointer-events: none; z-index: 5; }

        .heart {
            position: absolute;
            font-size: 20px;
            filter: drop-shadow(0 0 16px currentColor);
            animation: love-float 4s cubic-bezier(0.25, 0.1, 0.25, 1) infinite;
        }

        @keyframes love-float {
            0% { transform: translateY(100vh) rotate(0deg) scale(0); opacity: 0; }
            15% { opacity: 1; transform: scale(1.2); }
            85% { opacity: 1; }
            100% { transform: translateY(-100px) rotate(720deg) scale(0.5); opacity: 0; }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .bouquets-container { gap: 40px; }
            .bouquet { height: 220px; gap: 4px; padding: 16px; }
            .stem { height: 180px; }
            .flower { width: 32px; height: 40px; }
            .petal { width: 22px; height: 28px; }
            .btn { font-size: 20px; padding: 18px 36px; }
            .message { font-size: 22px; padding: 40px 28px; margin-top: 32px; }
        }

        body.bloomed { --bg-primary: #120a28; }
    </style>
</head>

    <button class="btn" id="bloomBtn">Tap to Bloom Both 💖🌷</button>

        Two bouquets for our endless love. Each bloom tells our story of growth, beauty, and forever. Thank you for being my everything. I love you eternally.
    </div>

    <div id="youtube-player"></div>

    <script>
        // Dual cursors
        const cursor1 = document.getElementById('cursor1');
        const cursor2 = document.getElementById('cursor2');
        document.addEventListener('mousemove', (e) => {
            cursor1.style.left = e.clientX - 8 + 'px';
            cursor1.style.top = e.clientY - 8 + 'px';
            cursor2.style.left = e.clientX - 4 + 'px';
            cursor2.style.top = e.clientY - 4 + 'px';
        });

        // Particle system
        const particles = document.getElementById('particles');
        const colors = ['rose', 'mint', 'lavender'];
        for (let i = 0; i < 30; i++) {
            const p = document.createElement('div');
            p.className = `particle ${colors[i % 3]}`;
            p.style.left = Math.random() * 100 + '%';
            p.style.width = p.style.height = (Math.random() * 6 + 2) + 'px';
            p.style.animationDuration = (Math.random() * 15 + 20) + 's';
            p.style.animationDelay = Math.random() * 10 + 's';
            particles.appendChild(p);
        }

        // YouTube API - plays exactly on button tap
        let player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtube-player', {
                height: '0', width: '0',
                videoId: '__8HhslsBEk',
                playerVars: { 'playsinline': 1, 'controls': 0, 'start': 45 },
                events: { 'onReady': (e) => e.target.mute() }
            });
        }
        const script = document.createElement('script');
        script.src = 'https://www.youtube.com/iframe_api';
        document.head.appendChild(script);

        // Bloom activation
        const btn = document.getElementById('bloomBtn');
        const body = document.body;
        const message = document.getElementById('message');
        const hearts = document.getElementById('hearts');
        let activated = false;

        function activate() {
            if (activated) return;
            activated = true;

            // Staggered dual bouquet bloom
            [...document.querySelectorAll('.tulip')].forEach((tulip, i) => {
                setTimeout(() => tulip.classList.add('bloom'), i * 150);
            });

            body.classList.add('bloomed');
            setTimeout(() => message.classList.add('bloomed'), 1600);
            
            // Music plays IMMEDIATELY on tap
            if (player) {
                player.unMute();
                player.playVideo();
            }

            createHearts();
        }

        btn.addEventListener('click', activate);
        document.addEventListener('touchstart', activate, { passive: true });

        function createHearts() {
            for (let i = 0; i < 25; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.className = 'heart';
                    heart.textContent = '💖';
                    heart.style.left = Math.random() * 100 + '%';
                    heart.style.animationDuration = (3 + Math.random() * 2) + 's';
                    heart.style.color = ['#ff3366', '#ff6b6b', '#a78bfa'][Math.floor(Math.random() * 3)];
                    hearts.appendChild(heart);
                    setTimeout(() => heart.remove(), 5000);
                }, i * 100);
            }
        }

        // Typewriter effect
        function typeWriter(el) {
            const text = el.textContent;
            el.textContent = '';
            let i = 0;
            const timer = setInterval(() => {
                el.textContent += text.charAt(i++);
                if (i > text.length) clearInterval(timer);
            }, 50);
        }
        new MutationObserver(() => typeWriter(message)).observe(message, { attributes: true });

        // Epic load animation
        window.addEventListener('load', () => {
            document.body.style.opacity = '0';
            document.body.style.transform = 'scale(0.92) rotateX(5deg)';
            setTimeout(() => {
                document.body.style.transition = 'all 1.2s cubic-bezier(0.23, 1, 0.32, 1)';
                document.body.style.opacity = '1';
                document.body.style.transform = 'scale(1) rotateX(0)';
            }, 200);
        });
    </script>
