<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monthsary Tulip Bouquet</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #0a192f, #000000);
      color: #f5f5f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      transition: background 1.5s ease-in-out;
    }

    /* subtle glow background */
    body::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(circle at center, rgba(255, 77, 109, 0.15), transparent 80%);
      opacity: 0.6;
      pointer-events: none;
      transition: opacity 1.5s ease-in-out;
    }

    .wrapper {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      max-width: 90vw;
      padding: 2rem;
    }

    h1 {
      font-size: 1.8rem;
      text-align: center;
      font-weight: 500;
      letter-spacing: 0.5px;
      opacity: 0;
      transform: translateY(20px);
      transition: all 1s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .subtitle {
      font-size: 1rem;
      opacity: 0;
      transform: translateY(20px);
      transition: all 1.1s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* button */
    .tap-button {
      appearance: none;
      border: none;
      background: rgba(255, 77, 109, 0.3);
      color: #fff;
      font-size: 1.1rem;
      font-weight: 600;
      padding: 1rem 2rem;
      border-radius: 60px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(255, 77, 109, 0.3);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 77, 109, 0.4);
      transition: all 0.3s ease-in-out;
      opacity: 0;
      transform: translateY(20px);
      transition-delay: 0.2s;
    }

    .tap-button:hover {
      background: rgba(255, 77, 109, 0.4);
      box-shadow: 0 6px 25px rgba(255, 77, 109, 0.5);
      transform: translateY(-2px);
    }

    .tap-button:active {
      transform: translateY(0);
    }

    /* bouquet wrapper */
    .bouquet {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: 1.5rem;
      height: 180px;
      max-width: 90vw;
      margin-top: 1rem;
      position: relative;
      overflow: visible;
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1),
                  transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .tulip {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .stem {
      width: 6px;
      height: 140px;
      background: #88cc88;
      border-radius: 3px;
      transform-origin: top;
      position: relative;
    }

    .leaf {
      width: 20px;
      height: 10px;
      background: #a8cc98;
      border-radius: 10px 10px 0 10px;
      position: absolute;
      transform-origin: left;
      opacity: 0.9;
      left: -8px;
    }

    .leaf:nth-of-type(1) {
      top: 40px;
      transform: rotate(-30deg);
    }

    .leaf:nth-of-type(2) {
      top: 70px;
      transform: rotate(25deg);
    }

    .petals {
      position: absolute;
      top: -34px;
      left: 50%;
      transform: translateX(-50%);
      width: 40px;
      height: 34px;
      display: flex;
      overflow: hidden;
      transform-origin: bottom center;
    }

    .petal {
      width: 16px;
      height: 34px;
      background: #ff6f8c;
      border-radius: 50% 50% 0 0;
      margin: 0 2px;
      position: relative;
      transform-origin: bottom center;
    }

    .petal:nth-of-type(1) {
      transform: rotate(-60deg) scale(0.88);
    }

    .petal:nth-of-type(2) {
      transform: rotate(-10deg);
    }

    .petal:nth-of-type(3) {
      transform: rotate(40deg) scale(0.88);
    }

    /* closed bud state */
    .tulip:not(.bloomed) .petals {
      transform: translateX(-50%) scale(0.65);
      transform-origin: bottom center;
    }

    .tulip:not(.bloomed) .petal {
      transform: rotate(-10deg);
    }

    /* glow around tulips when blooming */
    .tulip::after {
      content: "";
      position: absolute;
      top: -50px;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 60px;
      background: radial-gradient(circle, rgba(255, 77, 109, 0.3), transparent);
      border-radius: 50%;
      opacity: 0;
      transition: opacity 0.8s ease-in-out;
    }

    .tulip.bloomed::after {
      opacity: 0.8;
    }

    /* organic sway */
    .tulip.bloomed .stem {
      animation: sway 4s ease-in-out infinite alternate;
    }

    @keyframes sway {
      0% {
        transform: rotate(0);
      }
      100% {
        transform: rotate(2deg);
      }
    }

    /* typing effect */
    .message {
      max-width: 80vw;
      text-align: center;
      font-size: 1.1rem;
      opacity: 0;
      transform: translateY(25px);
      transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      white-space: pre-line;
      position: relative;
      z-index: 2;
    }

    /* floating hearts */
    .heart {
      position: absolute;
      font-size: 1.2rem;
      color: rgba(255, 77, 109, 0.8);
      opacity: 0;
      user-select: none;
      pointer-events: none;
    }

    /* particles in background */
    .particle {
      position: absolute;
      top: 0;
      left: 0;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: rgba(255, 77, 109, 0.3);
      opacity: 0;
      transform: translateY(100vh);
    }

    /* hidden audio iframe (no visible player) */
    iframe {
      position: absolute;
      top: -9999px;
      left: -9999px;
    }

    /* mobile touch friendliness */
    @media (max-width: 500px) {
      .tap-button {
        font-size: 1rem;
        padding: 0.9rem 1.6rem;
      }
      .bouquet {
        gap: 1rem;
        height: 140px;
      }
      .stem {
        height: 110px;
      }
      .petals {
        width: 32px;
        height: 28px;
      }
      .petal {
        width: 14px;
        height: 28px;
      }
    }
  </style>
</head>
<body>
  <div id="audioContainer"></div>

  <div class="wrapper">
    <h1 id="greeting">Happy Monthsary, babe</h1>
    <p class="subtitle" id="subtitle">Tap the button to make our tulips bloom 💖</p>

    <button class="tap-button" id="tapButton">Tap mo 'to 💖</button>

    <div class="bouquet" id="bouquet">
      <!-- tulips will be generated by JS -->
    </div>

    <div class="message" id="message"></div>
  </div>

  <script>
    // DOM elements
    const tapButton = document.getElementById("tapButton");
    const bouquet = document.getElementById("bouquet");
    const greeting = document.getElementById("greeting");
    const subtitle = document.getElementById("subtitle");
    const messageEl = document.getElementById("message");
    const audioContainer = document.getElementById("audioContainer");

    // generate 6 tulips
    const tulipCount = 6;

    function createTulip(index) {
      const tulip = document.createElement("div");
      tulip.className = "tulip";
      tulip.style.setProperty("--delay", `${index * 0.2}s`);

      const stem = document.createElement("div");
      stem.className = "stem";

      const leaf1 = document.createElement("div");
      leaf1.className = "leaf";
      const leaf2 = document.createElement("div");
      leaf2.className = "leaf";

      const petals = document.createElement("div");
      petals.className = "petals";

      for (let i = 0; i < 3; i++) {
        const petal = document.createElement("div");
        petal.className = "petal";
        petals.appendChild(petal);
      }

      tulip.appendChild(stem);
      stem.appendChild(leaf1);
      stem.appendChild(leaf2);
      tulip.appendChild(petals);

      return tulip;
    }

    for (let i = 0; i < tulipCount; i++) {
      bouquet.appendChild(createTulip(i));
    }

    const tulips = document.querySelectorAll(".tulip");

    // typing effect for message
    function typeMessage(text, el, delay = 40) {
      el.innerHTML = "";
      let i = 0;
      const type = setInterval(() => {
        if (i < text.length) {
          el.textContent += text[i];
          i++;
          el.scrollTop = 1000; // auto scroll
        } else {
          clearInterval(type);
        }
      }, delay);
    }

    // insert YouTube audio (Ebeb – Flow G, chorus only)
    function injectAudio() {
      const iframe = document.createElement("iframe");
      iframe.src =
        "https://www.youtube.com/embed/oAqqQqQdrEc?autoplay=1&start=60&end=120&controls=0&showinfo=0&rel=0";
      iframe.width = "1";
      iframe.height = "1";
      iframe.style.position = "absolute";
      iframe.style.top = "-9999px";
      iframe.style.left = "-9999px";
      iframe.allow = "autoplay; encrypted-media";
      audioContainer.appendChild(iframe);
    }

    // entry animation on load
    window.addEventListener("load", () => {
      setTimeout(() => {
        greeting.style.opacity = "1";
        greeting.style.transform = "translateY(0)";
      }, 300);

      setTimeout(() => {
        subtitle.style.opacity = "1";
        subtitle.style.transform = "translateY(0)";
      }, 600);

      setTimeout(() => {
        bouquet.style.opacity = "1";
        bouquet.style.transform = "translateY(0)";
      }, 900);

      setTimeout(() => {
        toggleTapButton(true);
      }, 1200);
    });

    function toggleTapButton(visible) {
      tapButton.style.opacity = visible ? "1" : "0";
      tapButton.style.transform = visible ? "translateY(0)" : "translateY(20px)";
    }

    // bloom tulips sequentially
    function bloomTulips() {
      tapButton.disabled = true;
      document.body.style.background =
        "linear-gradient(135deg, #0a193f, #0a0a0a)";

      document.body.style.opacity = "0.8";
      setTimeout(() => {
        document.body.style.opacity = "1";
      }, 300);

      tulips.forEach((tulip, index) => {
        setTimeout(() => {
          tulip.classList.add("bloomed");
          createFloatingHeart(tulip);
        }, 300 + index * 250);
      });

      // after bloom, show message with typing
      setTimeout(() => {
        const loveMessage =
          "THANK YOU FOR EVERYTHING MY LOVE 💖\n" +
          "Happy monthsary, babe — I'm so proud of how we've grown together.\n" +
          "Every fight, every laugh, every late night chat has made us stronger.\n" +
          "I know I'm still not perfect, but I choose you more and more every day.\n" +
          "Just like these tulips blooming slowly and beautifully, I'm falling deeper in love with you.\n" +
          "I love you so much, and I can't wait for all our future months together.";

        messageEl.style.opacity = "1";
        messageEl.style.transform = "translateY(0)";
        typeMessage(loveMessage, messageEl, 30);
      }, 2000 + tulipCount * 250);
    }

    // floating hearts
    function createFloatingHeart(tulip) {
      const rect = tulip.getBoundingClientRect();
      const x = rect.left + rect.width / 2;
      const y = window.innerHeight - rect.bottom;

      const heart = document.createElement("div");
      heart.className = "heart";
      heart.textContent = "💗";
      heart.style.left = `${x}px`;
      heart.style.top = `${y}px`;

      document.body.appendChild(heart);

      setTimeout(() => {
        heart.style.opacity = "1";
        heart.style.transform = `translate(${(Math.random() - 0.5) * 100}px, -100px) scale(1.2)`;
        heart.style.transition = "all 2.5s ease-out";
      }, 10);

      setTimeout(() => {
        heart.remove();
      }, 2500);
    }

    // particles in background
    function createParticles() {
      const count = 20;
      for (let i = 0; i < count; i++) {
        const p = document.createElement("div");
        p.className = "particle";
        p.style.left = `${Math.random() * 100}%`;
        p.style.animationDelay = `${Math.random() * 2}s`;
        p.style.animationDuration = `${3 + Math.random() * 2}s`;
        document.body.appendChild(p);

        // animate particle
        setTimeout(() => {
          p.style.opacity = "0.3";
          p.style.transform = `translate(0, -${Math.random() * 200}px)`;
        }, 200);
      }
    }

    createParticles();

    // interaction on button click
    tapButton.addEventListener("click", () => {
      bloomTulips();
      injectAudio();
    });
  </script>
</body>
</html>
