<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tulip Bouquet - Eternal Love</title>
    <style>
        :root {
            --bg-start: #0a0a1e;
            --bg-end: #000000;
            --accent-pink: #ff4d6d;
            --accent-green: #4ade80;
            --text-light: #f8fafc;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glow-pink: rgba(255, 77, 109, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
            color: var(--text-light);
            height: 100vh;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: none;
        }

        /* Custom cursor */
        body * { cursor: none; }
        .cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            background: radial-gradient(circle, var(--accent-pink), transparent);
            border-radius: 50%;
            pointer-events: none;
            z-index: 100;
            transition: transform 0.1s ease;
            mix-blend-mode: difference;
        }

        /* Dribbble-inspired particles */
        .particles {
            position: absolute;
            inset: 0;
            overflow: hidden;
            z-index: 1;
        }

        .particle {
            position: absolute;
            background: radial-gradient(circle, var(--accent-pink) 0%, transparent 70%);
            border-radius: 50%;
            opacity: 0.3;
            animation: float 20s linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
        }

        .bouquet {
            display: flex;
            align-items: end;
            gap: 8px;
            height: 300px;
            padding: 40px;
            z-index: 10;
            position: relative;
        }

        .tulip {
            display: flex;
            flex-direction: column;
            align-items: center;
            transform-origin: bottom center;
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.4));
        }

        .stem {
            width: 3px;
            height: 220px;
            background: linear-gradient(to top, var(--accent-green), #22c55e);
            border-radius: 2px 2px 0 0;
            position: relative;
            transition: all 1s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .stem::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent 45%, rgba(255,255,255,0.2) 50%, transparent 55%);
            animation: sway 3s ease-in-out infinite;
        }

        .leaf {
            position: absolute;
            width: 25px;
            height: 50px;
            background: linear-gradient(135deg, var(--accent-green), #22c55e);
            border-radius: 40% 0 70% 0;
            left: -12px;
        }

        .leaf.lower { bottom: 80px; transform: rotate(-20deg); }
        .leaf.upper { bottom: 40px; transform: rotate(20deg); left: auto; right: -12px; }

        .flower {
            position: relative;
            width: 36px;
            height: 45px;
            margin-top: -8px;
            transition: all 1.2s cubic-bezier(0.23, 1, 0.32, 1);
            transform-origin: center bottom;
        }

        .bloom .flower {
            transform: scale(1.15) rotate(1deg);
        }

        .petal {
            position: absolute;
            width: 24px;
            height: 32px;
            background: radial-gradient(ellipse at top, var(--accent-pink), #fb7185);
            border-radius: 50% 50% 60% 60% / 55% 55% 45% 45%;
            top: 0;
            left: 50%;
            transform: translateX(-50%) scaleY(0.25) translateY(15px);
            transition: all 1s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            filter: drop-shadow(0 8px 24px var(--glow-pink));
        }

        .bloom .petal:nth-child(1) { transform: translateX(-50%) scaleY(1) rotate(0deg); }
        .bloom .petal:nth-child(2) { transform: translateX(-50%) scaleY(1) rotate(120deg); }
        .bloom .petal:nth-child(3) { transform: translateX(-50%) scaleY(1) rotate(240deg); }

        .bloom .petal {
            filter: drop-shadow(0 0 32px var(--glow-pink));
            background: radial-gradient(ellipse at top, #ff4d6d, #f472b6);
        }

        @keyframes sway {
            0%, 100% { transform: rotateZ(0deg); }
            50% { transform: rotateZ(3deg); }
        }

        @keyframes glow-pulse {
            0%, 100% { filter: drop-shadow(0 0 16px var(--glow-pink)); }
            50% { filter: drop-shadow(0 0 40px var(--glow-pink)); }
        }

        .bloom .stem { animation: glow-pulse 2s ease-in-out infinite; }

        .btn {
            position: relative;
            z-index: 20;
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            color: var(--text-light);
            font-size: 20px;
            font-weight: 500;
            padding: 18px 40px;
            border-radius: 48px;
            cursor: none;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            box-shadow: 0 16px 48px rgba(0,0,0,0.4);
            margin-top: 32px;
        }

        .btn:hover {
            background: rgba(255,77,109,0.15);
            border-color: var(--accent-pink);
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 24px 64px rgba(255,77,109,0.2);
        }

        .message {
            opacity: 0;
            transform: translateY(32px);
            transition: all 1.4s 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            text-align: center;
            max-width: 420px;
            font-size: 22px;
            line-height: 1.6;
            padding: 48px 32px;
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 32px 80px rgba(0,0,0,0.5);
            margin-top: 48px;
            position: relative;
            z-index: 15;
        }

        .bloomed .message {
            opacity: 1;
            transform: translateY(0);
        }

        .hearts {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 5;
        }

        .heart {
            position: absolute;
            font-size: 18px;
            color: var(--accent-pink);
            animation: heart-float 4s cubic-bezier(0.25, 0.46, 0.45, 0.94) infinite;
            opacity: 0;
        }

        @keyframes heart-float {
            0% {
                transform: translateY(100vh) scale(0) rotate(0deg);
                opacity: 1;
            }
            50% { opacity: 1; transform: scale(1) rotate(180deg); }
            100% {
                transform: translateY(-120px) scale(0.8) rotate(360deg);
                opacity: 0;
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .bouquet {
                height: 240px;
                gap: 6px;
                padding: 20px;
            }
            .stem { height: 160px; }
            .flower { width: 28px; height: 36px; }
            .petal { width: 18px; height: 24px; }
            .btn { font-size: 18px; padding: 16px 32px; }
            .message { font-size: 20px; padding: 32px 24px; margin-top: 24px; }
        }

        /* Brighten on bloom */
        body.bloomed {
            --bg-start: #0f0f28;
        }
    </style>
</head>
<body>
    <div class="cursor" id="cursor"></div>
    <div class="particles" id="particles"></div>
    <div class="hearts" id="hearts"></div>
    
    <div class="bouquet" id="bouquet">
        <div class="tulip" style="--delay: 0s">
            <div class="stem">
                <div class="leaf lower"></div>
                <div class="leaf upper"></div>
            </div>
            <div class="flower">
                <div class="petal" style="transition-delay: 0s"></div>
                <div class="petal" style="transition-delay: 0.1s"></div>
                <div class="petal" style="transition-delay: 0.2s"></div>
            </div>
        </div>
        <div class="tulip" style="--delay: 0.15s; transform: scale(0.92)">
            <div class="stem">
                <div class="leaf lower"></div>
                <div class="leaf upper"></div>
            </div>
            <div class="flower">
                <div class="petal" style="transition-delay: 0s"></div>
                <div class="petal" style="transition-delay: 0.1s"></div>
                <div class="petal" style="transition-delay: 0.2s"></div>
            </div>
        </div>
        <div class="tulip" style="--delay: 0.3s; transform: scale(1.08)">
            <div class="stem">
                <div class="leaf lower"></div>
                <div class="leaf upper"></div>
            </div>
            <div class="flower">
                <div class="petal" style="transition-delay: 0s"></div>
                <div class="petal" style="transition-delay: 0.1s"></div>
                <div class="petal" style="transition-delay: 0.2s"></div>
            </div>
        </div>
        <div class="tulip" style="--delay: 0.45s">
            <div class="stem">
                <div class="leaf lower"></div>
                <div class="leaf upper"></div>
            </div>
            <div class="flower">
                <div class="petal" style="transition-delay: 0s"></div>
                <div class="petal" style="transition-delay: 0.1s"></div>
                <div class="petal" style="transition-delay: 0.2s"></div>
            </div>
        </div>
        <div class="tulip" style="--delay: 0.6s; transform: scale(0.95)">
            <div class="stem">
                <div class="leaf lower"></div>
                <div class="leaf upper"></div>
            </div>
            <div class="flower">
                <div class="petal" style="transition-delay: 0s"></div>
                <div class="petal" style="transition-delay: 0.1s"></div>
                <div class="petal" style="transition-delay: 0.2s"></div>
            </div>
        </div>
    </div>

    <button class="btn" id="bloomBtn">Tap to Bloom 💖</button>
    
    <div class="message" id="message">
        Thank you for everything, my love. Like these tulips, our love blooms more beautifully every day. I love you always. 🌷💕
    </div>

    <div id="youtube-player"></div>

    <script>
        // Custom cursor
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX - 10 + 'px';
            cursor.style.top = e.clientY - 10 + 'px';
        });

        // Particles
        const particles = document.getElementById('particles');
        for (let i = 0; i < 20; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.width = p.style.height = (Math.random() * 4 + 2) + 'px';
            p.style.animationDuration = (Math.random() * 10 + 15) + 's';
            p.style.animationDelay = Math.random() * 5 + 's';
            particles.appendChild(p);
        }

        // YouTube API for chorus loop (starts at ~0:45, loops 0:45-1:15)
        let player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtube-player', {
                height: '0',
                width: '0',
                videoId: '__8HhslsBEk',
                playerVars: {
                    'playsinline': 1,
                    'controls': 0,
                    'modestbranding': 1,
                    'start': 45,  // Chorus start
                    'rel': 0
                },
                events: {
                    'onReady': (e) => {
                        e.target.mute();  // Subtle volume
                        e.target.setLoop(true);  // Custom loop for chorus
                    }
                }
            });
        }
        const tag = document.createElement('script');
        tag.src = 'https://www.youtube.com/iframe_api';
        document.head.appendChild(tag);

        // Bloom logic
        const btn = document.getElementById('bloomBtn');
        const body = document.body;
        const message = document.getElementById('message');
        const hearts = document.getElementById('hearts');
        let bloomed = false;

        btn.addEventListener('click', bloom);
        document.addEventListener('touchstart', bloom, { passive: true });

        function bloom() {
            if (bloomed) return;
            bloomed = true;

            const tulips = document.querySelectorAll('.tulip');
            tulips.forEach((tulip, i) => {
                setTimeout(() => tulip.classList.add('bloom'), i * 180);
            });

            body.classList.add('bloomed');
            
            setTimeout(() => {
                message.classList.add('bloomed');
                typeWriter(message);
            }, 1400);

            // Play chorus
            if (player?.playVideo) {
                player.unMute();
                player.seekTo(45, true);
                player.playVideo();
                // Loop chorus section
                setInterval(() => {
                    if (!player.getPlayerState() || player.getCurrentTime() > 75) {
                        player.seekTo(45, true);
                    }
                }, 1000);
            }

            createHearts();
        }

        function createHearts() {
            for (let i = 0; i < 20; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.className = 'heart';
                    heart.innerHTML = ['💖', '💕', '💗'][Math.floor(Math.random()*3)];
                    heart.style.left = Math.random() * 100 + '%';
                    heart.style.animationDuration = (Math.random() * 2 + 3) + 's';
                    hearts.appendChild(heart);
                    setTimeout(() => heart.remove(), 5000);
                }, i * 120);
            }
        }

        function typeWriter(el) {
            const text = el.textContent;
            el.textContent = '';
            let i = 0;
            const iv = setInterval(() => {
                el.textContent += text[i++];
                if (i > text.length) {
                    clearInterval(iv);
                }
            }, 60);
        }

        // Load animation
        window.addEventListener('load', () => {
            document.body.style.opacity = '0';
            document.body.style.transform = 'scale(0.95)';
            setTimeout(() => {
                document.body.style.transition = 'all 1s cubic-bezier(0.34, 1.56, 0.64, 1)';
                document.body.style.opacity = '1';
                document.body.style.transform = 'scale(1)';
            }, 100);
        });
    </script>
</body>
</html>
